name: Setup Branch Protection

# Run this workflow ONCE after the initial repo setup to lock the main branch.
#
# Prerequisites:
#   1. Go to Settings → Secrets and variables → Actions
#   2. Create a secret named GH_PAT with a Personal Access Token
#      that has "repo" scope (or "administration:write" for fine-grained tokens)
#   3. Come back here and click "Run workflow"
#
# What it configures on `main`:
#   - No direct pushes (PRs required)
#   - CI must pass before merge (type-check + test + build)
#   - No force-pushes
#   - No branch deletion
#   - Admins are NOT exempt (enforced for everyone)

on:
  workflow_dispatch:

jobs:
  protect:
    name: Apply branch protection rules
    runs-on: ubuntu-latest

    steps:
      - name: Protect main branch
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          curl -X PUT \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/$REPO/branches/main/protection \
            -d '{
              "required_status_checks": {
                "strict": true,
                "contexts": ["CI / Lint, Test & Build"]
              },
              "enforce_admins": true,
              "required_pull_request_reviews": {
                "dismiss_stale_reviews": true,
                "require_code_owner_reviews": true,
                "required_approving_review_count": 0
              },
              "restrictions": null,
              "allow_force_pushes": false,
              "allow_deletions": false,
              "block_creations": false
            }'

      - name: Verify protection
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          echo "--- Current protection on main ---"
          curl -s \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO/branches/main/protection \
            | python3 -m json.tool
