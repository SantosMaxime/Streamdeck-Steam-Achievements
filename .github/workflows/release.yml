name: Release

# Triggers when any push lands on main.
# A separate "check" job scans all commits in the push for a "release:" message.
# The build/publish job only runs when one is found.
# This correctly handles PR merges where HEAD is a "Merge pull request" commit.
on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check for release commit
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan commits for release bump
        id: check
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FOUND=$(git log --format="%s" | grep "^release:" | head -1)
          else
            FOUND=$(git log "${BEFORE}..${{ github.sha }}" --format="%s" | grep "^release:" | head -1)
          fi
          if [ -n "$FOUND" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "Found release commit: $FOUND"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "No release commit in this push — skipping release."
          fi

  release:
    name: Build & Publish Release
    needs: check
    if: needs.check.outputs.is_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate icons
        run: npm run gen-icons

      - name: Generate profiles
        run: npm run gen-profiles

      - name: Build
        run: npm run build

      - name: Package plugin
        run: npx @elgato/cli pack com.maxik.steam-achievements.sdPlugin --force

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: com.maxik.steam-achievements.streamDeckPlugin
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
