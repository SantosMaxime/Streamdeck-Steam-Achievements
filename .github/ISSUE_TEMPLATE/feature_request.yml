name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Steam Achievement Hunter? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Achievement Radar
        - Achievement Grid
        - Game Browser
        - Dashboard
        - Daily Pick
        - UI / Property Inspector
        - New Action
        - Other
    validations:
      required: true
