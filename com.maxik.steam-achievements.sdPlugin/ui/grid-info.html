<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Grid Info</title>
	<link rel="stylesheet" href="https://sdpi-components.dev/releases/v3/sdpi-components.css" />
	<script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>
<body>
	<sdpi-item label="When pressed">
		<sdpi-select setting="clickBehavior">
			<option value="mode-switch">Switch display (games ↔ achievements)</option>
			<option value="sort">Cycle sort order</option>
			<option value="nothing">Nothing</option>
		</sdpi-select>
	</sdpi-item>
	<sdpi-item label="">
		<span style="color: #969696; font-size: 11px; line-height: 1.5;">
			<strong>Switch display:</strong> toggles between browsing your game library and viewing achievements for a game.<br/>
			<strong>Cycle sort:</strong> rotates through Default → Rarest first → Alphabetical → Locked only → Unlocked only.
		</span>
	</sdpi-item>
</body>
</html>
