<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Grid Back</title>
	<link rel="stylesheet" href="https://sdpi-components.dev/releases/v3/sdpi-components.css" />
	<script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>
<body>
	<sdpi-item label="Open profile">
		<sdpi-textfield
			setting="targetProfile"
			placeholder="e.g. profiles/grid-standard"
		></sdpi-textfield>
	</sdpi-item>
	<sdpi-item label="">
		<span style="color: #969696; font-size: 11px; line-height: 1.5;">
			Leave empty to use the default <strong>go back</strong> behaviour.<br/>
			Set a profile name to make this key <em>open</em> that profile directly —
			useful on your main profile to jump straight to the grid (e.g. <code>profiles/grid-standard</code>).
		</span>
	</sdpi-item>
</body>
</html>
