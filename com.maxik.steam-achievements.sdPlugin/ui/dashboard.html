<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Steam Achievement Hunter - Settings</title>
	<link rel="stylesheet" href="https://sdpi-components.dev/releases/v3/sdpi-components.css" />
	<script src="https://sdpi-components.dev/releases/v3/sdpi-components.js"></script>
</head>
<body>
	<!--
		This Property Inspector uses sdpi-components which automatically
		syncs form fields with global settings via the SD SDK.
		Fields with "global" attribute are saved to global settings (shared).
	-->

	<sdpi-item label="Steam API Key">
		<sdpi-textfield
			setting="apiKey"
			global
			type="password"
			placeholder="Enter your Steam Web API key"
			required
		></sdpi-textfield>
	</sdpi-item>

	<sdpi-item label="Get your key">
		<sdpi-link url="https://steamcommunity.com/dev/apikey">steamcommunity.com/dev/apikey</sdpi-link>
	</sdpi-item>

	<sdpi-item label="Steam ID (64-bit)">
		<sdpi-textfield
			setting="steamId"
			global
			placeholder="e.g. 76561198012345678"
			required
		></sdpi-textfield>
	</sdpi-item>

	<sdpi-item label="Find your ID">
		<sdpi-link url="https://steamid.io/">steamid.io</sdpi-link>
	</sdpi-item>

	<details>
		<summary style="color: #969696; cursor: pointer; padding: 8px 0; font-size: 12px;">
			How to use
		</summary>
		<div style="color: #969696; font-size: 11px; padding: 4px 12px; line-height: 1.5;">
			<p><strong>1.</strong> Get your Steam Web API key from the link above.</p>
			<p><strong>2.</strong> Enter your 64-bit Steam ID (use steamid.io to find it).</p>
			<p><strong>3.</strong> These credentials are shared across all Steam Achievement Hunter actions.</p>
			<p><strong>4.</strong> Press the key on your Stream Deck to force a refresh.</p>
		</div>
	</details>
</body>
</html>
